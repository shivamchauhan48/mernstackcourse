<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div id="login">
      <div id="left">
        <img
          src="https://png.pngtree.com/png-clipart/20250531/original/pngtree-cartoon-washing-machine-with-laundry-png-image_21103058.png"
          alt=""
        />
      </div>
      <div id="right">
        <h1>Hello Again!</h1>
        <h3>Welcome back! We missed you!</h3>
        <div>
          <label for="email">Email</label>
          <br />
          <input type="email" id="email" placeholder="EmailId@site.com" />
          <div>
            <label for="password">Password</label>
            <br />
            <input type="password" id="password" placeholder="Password" />
            <p><span>Forgot Password </span></p>
          </div>
          <button>Login</button>
          <div id="lastline">
            <p>Not a member? <span> Register Now </span></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
